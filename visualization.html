        /**
         * Draw a bar chart showing Study Hours vs Final Score
         * @param {string} canvasId - The ID of the canvas element
         * @param {Array} data - The dataset array
         */
        function drawBarChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy existing chart if it exists
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            
            // Prepare data for bar chart
            const labels = data.map((item, index) => `Student ${index + 1}`);
            const studyHours = data.map(item => item.studyHours);
            const scores = data.map(item => item.score);
            
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Study Hours',
                            data: studyHours,
                            backgroundColor: 'rgba(54, 162, 235, 0.7)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Final Score',
                            data: scores,
                            backgroundColor: 'rgba(255, 99, 132, 0.7)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {

                            }

        /**
         * Draw a scatter plot showing Attendance vs Score
         * @param {string} canvasId - The ID of the canvas element
         * @param {Array} data - The dataset array
         */
        function drawScatterPlot(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy existing chart if it exists
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            
            // Prepare scatter data
            const scatterData = data.map(item => ({
                x: item.attendance,
                y: item.score
            }));
            
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Attendance vs Score',
                        data: scatterData,
                        backgroundColor: 'rgba(75, 192, 192, 0.7)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: {
                                display: true,
                                text: 'Attendance (%)'
                            },
                            min: 40,
                            max: 100
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Final Score'
                            },
                            min: 40,
                            max: 100
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Attendance: ${context.parsed.x}%, Score: ${context.parsed.y}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        /**
         * Draw a histogram showing Final Score distribution
         * @param {string} canvasId - The ID of the canvas element
         * @param {Array} data - The dataset array
         */
        function drawHistogram(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy existing chart if it exists
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            
            // Create bins for histogram
            const scores = data.map(item => item.score);
            const binSize = 10;
            const bins = {};
            
            // Initialize bins
            for (let i = 40; i <= 100; i += binSize) {
                bins[`${i}-${i + binSize - 1}`] = 0;
            }
            
            // Count scores in each bin
            scores.forEach(score => {
                const binStart = Math.floor(score / binSize) * binSize;
                const binKey = `${binStart}-${binStart + binSize - 1}`;
                if (bins[binKey] !== undefined) {
                    bins[binKey]++;
                }
            });
            
            const labels = Object.keys(bins);
            const values = Object.values(bins);
            
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Students',
                        data: values,
                        backgroundColor: 'rgba(153, 102, 255, 0.7)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1,
                        barPercentage: 1.0,
                        categoryPercentage: 1.0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: 'Final Score Distribution'
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Score Range'
                            },
                            categoryPercentage: 1.0,
                            barPercentage: 1.0
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Number of Students'
                            },
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        /**
         * Draw a pie chart showing Grade distribution (None/Mild/Moderate/Severe)
         * @param {string} canvasId - The ID of the canvas element
         * @param {Array} data - The dataset array
         */
        function drawPieChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy existing chart if it exists
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            
            // Count grades
            const gradeCounts = {
                'None': 0,
                'Mild': 0,
                'Moderate': 0,
                'Severe': 0
            };
            
            data.forEach(item => {
                if (gradeCounts[item.grade] !== undefined) {
                    gradeCounts[item.grade]++;
                }
            });
            
            const labels = Object.keys(gradeCounts);
            const values = Object.values(gradeCounts);
            
            const colors = {
                'None': 'rgba(75, 192, 192, 0.7)',
                'Mild': 'rgba(255, 206, 86, 0.7)',
                'Moderate': 'rgba(255, 159, 64, 0.7)',
                'Severe': 'rgba(255, 99, 132, 0.7)'
            };
            
            const borderColors = {
                'None': 'rgba(75, 192, 192, 1)',
                'Mild': 'rgba(255, 206, 86, 1)',
                'Moderate': 'rgba(255, 159, 64, 1)',
                'Severe': 'rgba(255, 99, 132, 1)'
            };
            
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: labels.map(label => colors[label]),
                        borderColor: labels.map(label => borderColors[label]),
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    size: 14
                                }
                            }
                        },
                        title: {
                            display: true,
                            text: 'Addiction Level Distribution'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize all charts when the page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (window.DS && window.DS.length > 0) {
                drawBarChart('barChart', window.DS);
                drawScatterPlot('scatterChart', window.DS);
                drawHistogram('histogramChart', window.DS);
                drawPieChart('pieChart', window.DS);
            }
        });
